// ─── Helpers ─────────────────────────────────────────────────────
function tc(c) { return (c==="#F59E0B"||c==="#84CC16") ? "#1a1a1a":"#fff"; }
function wkKey(n) { return `w${n}`; }
function countH(weekSched) {
  if (!weekSched) return 0;
  let h=0;
  Object.values(weekSched).forEach(day=>{
    if (!day) return;
    Object.values(day).forEach(v=>{ if(v) h++; });
  });
  return h;
}
function getMonday(offset) {
  const t=new Date(), d=t.getDay(), diff=d===0?-6:1-d;
  const m=new Date(t); m.setDate(t.getDate()+diff+offset*7); return m;
}
function fmtDate(d) { return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function dayDate(monday, i) { const d=new Date(monday); d.setDate(monday.getDate()+i); return fmtDate(d); }
function shiftSpans(slots) {
  return Object.keys(SHIFT_META).map(id=>({
    id, label:SHIFT_META[id].label,
    cols:slots.filter(h=>h.shiftId===id).length
  })).filter(g=>g.cols>0);
}

// ─── Small shared components ──────────────────────────────────────
function ColorPicker({value,onChange}) {

}
function EmojiPicker({value,onChange,accent}) {
  return <div>{EMOJI_GROUPS.map(g=><div key={g.label} style={{marginBottom:12}}>
    <div style={{fontSize:10,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{g.label}</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
      {g.emojis.map(em=><div key={em} onClick={()=>onChange(em)} style={{width:38,height:38,borderRadius:9,background:value===em?accent+"33":"#0f1117",border:value===em?`2px solid ${accent}`:"2px solid #2a3142",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",boxSizing:"border-box"}}>{em}</div>)}
    </div>
  </div>)}</div>;
}

// ─── Cell rendering helper ────────────────────────────────────────
function CellContent({code,r,empName,employees,size="normal"}) {
  const fs = size==="small" ? {icon:8,code:7,name:6} : {icon:10,code:8,name:6.5};
  if (code==="BAJA") return <><span style={{fontSize:fs.icon,lineHeight:1}}>🤒</span><span style={{fontSize:fs.code-1,fontWeight:700,color:"#ef4444",lineHeight:1}}>BAJA</span></>;
  if (code==="VAC")  return <><span style={{fontSize:fs.icon,lineHeight:1}}>🏖️</span><span style={{fontSize:fs.code-1,fontWeight:700,color:"#06B6D4",lineHeight:1}}>VAC</span></>;
  if (code?.startsWith("TIT:")) {
    const t=employees?.find(e=>e.id===parseInt(code.split(":")[1]));
    return <><span style={{fontSize:fs.icon-1,lineHeight:1}}>👤</span><span style={{fontSize:fs.code-1,fontWeight:700,color:"#8B5CF6",lineHeight:1}}>{t?.name?.split(" ")[0]||"TIT"}</span></>;
  }
  if (code && r) return <><span style={{fontSize:fs.code,fontWeight:900,color:r.color,lineHeight:1}}>{code}</span><span style={{fontSize:fs.name,fontWeight:600,color:r.color+"cc",lineHeight:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:HOUR_W-4,textAlign:"center"}}>{empName}</span></>;
  return <span style={{width:3,height:3,borderRadius:"50%",background:"#2a3142",display:"block"}}/>;
}
function cellBg(code,r,sc) {
  if (code==="BAJA") return {background:"#ef444422",border:"1px solid #ef444466"};
  if (code==="VAC")  return {background:"#06B6D422",border:"1px solid #06B6D466"};
  if (code?.startsWith("TIT:")) return {background:"#8B5CF622",border:"1px solid #8B5CF666"};
  if (r) return {background:r.color+"33",border:`1px solid ${r.color}66`};
  return {background:sc+"08",border:`1px solid ${sc}18`};
}

// ─── CellPicker ───────────────────────────────────────────────────
function CellPicker({cellPicker,employees,dept,slots,onAssign,onClose}) {
  const [numSlots, setNumSlots] = useState(1);
  const emp = employees.find(e=>e.id===cellPicker.empId);
  const startIdx = slots.findIndex(h=>h.label===cellPicker.slotKey);
  const maxSlots = slots.length - startIdx;
  const keys = slots.slice(startIdx, startIdx+numSlots).map(h=>h.label);
  const curCode = emp?.schedules[cellPicker.wk]?.[cellPicker.dayIdx]?.[cellPicker.slotKey]||null;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#00000088",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#1e2433",borderRadius:"20px 20px 0 0",padding:"18px 16px 40px",width:"100%",maxWidth:430,margin:"0 auto",maxHeight:"90vh",overflowY:"auto"}}>
        {/* Name box */}
        <div style={{background:"#0f1117",border:"1px solid #2a3142",borderRadius:14,padding:"13px 15px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:46,height:46,borderRadius:12,background:dept.color+"22",border:`2px solid ${dept.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{dept.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:18,color:"#f1f5f9"}}>{emp?.name}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{DAYS_F[cellPicker.dayIdx]} · {cellPicker.slotKey}{numSlots>1?` → ${slots[startIdx+numSlots-1]?.label}`:""}</div>
          </div>
          {/* Slot counter */}
          <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <button onClick={()=>setNumSlots(s=>Math.max(1,s-1))} style={{width:28,height:28,borderRadius:7,background:"#ef444422",border:"1px solid #ef444455",color:"#ef4444",fontSize:15,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            <div style={{minWidth:24,textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:800,color:dept.color}}>{numSlots}</div>
              <div style={{fontSize:7,color:"#475569"}}>slot{numSlots>1?"s":""}</div>
            </div>
            <button onClick={()=>setNumSlots(s=>Math.min(maxSlots,s+1))} style={{width:28,height:28,borderRadius:7,background:dept.color+"22",border:`1px solid ${dept.color}55`,color:dept.color,fontSize:15,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        </div>
        {/* Actions */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <button onClick={()=>onAssign("BAJA",keys)} style={{background:curCode==="BAJA"?"#ef444433":"#ef444411",border:`2px solid ${curCode==="BAJA"?"#ef4444":"#ef444433"}`,borderRadius:14,padding:"16px 6px",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:5}}>🤒</div>
            <div style={{fontSize:12,fontWeight:800,color:"#ef4444"}}>Baja</div>
            <div style={{fontSize:9,color:"#ef444488",marginTop:2}}>Médica</div>
          </button>
          <button onClick={()=>onAssign("VAC",keys)} style={{background:curCode==="VAC"?"#06B6D433":"#06B6D411",border:`2px solid ${curCode==="VAC"?"#06B6D4":"#06B6D433"}`,borderRadius:14,padding:"16px 6px",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:5}}>🏖️</div>
            <div style={{fontSize:12,fontWeight:800,color:"#06B6D4"}}>Vacac.</div>
            <div style={{fontSize:9,color:"#06B6D488",marginTop:2}}>Libres</div>
          </button>
          <button onClick={()=>onAssign(`TIT:${emp?.id}`,keys)} style={{background:curCode===`TIT:${emp?.id}`?"#8B5CF633":"#8B5CF611",border:`2px solid ${curCode===`TIT:${emp?.id}`?"#8B5CF6":"#8B5CF633"}`,borderRadius:14,padding:"16px 6px",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:5}}>👤</div>
            <div style={{fontSize:12,fontWeight:800,color:"#8B5CF6"}}>Titular</div>
            <div style={{fontSize:9,color:"#8B5CF688",marginTop:2}}>{emp?.name?.split(" ")[0]}</div>
          </button>
        </div>
        <button onClick={()=>onAssign(null,keys)} style={{width:"100%",padding:"11px",background:"#ffffff08",border:"1px solid #2a3142",borderRadius:10,color:"#64748b",fontWeight:600,fontSize:13,cursor:"pointer"}}>✕ Quitar asignación</button>
      </div>
    </div>
  );
}

// ─── Schedule Grid (reusable) ─────────────────────────────────────
function ScheduleGrid({dept,employees,slots,weekOffset,selectedDay,onCellClick,rowKey="day"}) {
  // rowKey="day" => rows are employees, we show one day
  // rowKey="week" => rows are days for one employee
  const wk = wkKey(weekOffset);
  const monday = getMonday(weekOffset);
  const spans = shiftSpans(slots);
  const totalW = NAME_W + slots.length * HOUR_W + 36;
  const deptEmps = employees.filter(e=>e.dept===dept.id);
  const roleObj = c => dept.roles.find(r=>r.code===c);

  const rows = rowKey==="day"
    ? deptEmps.map(emp=>({ id:emp.id, label:emp.name, getData:(slotLabel)=>emp.schedules[wk]?.[selectedDay]?.[slotLabel]||null, emp }))
    : DAYS_F.map((name,di)=>({ id:di, label:`${DAYS_S[di]} ${dayDate(monday,di)}`, getData:(slotLabel)=>{
        const emp=employees.find(e=>e.id===rowKey);
        return emp?.schedules[wk]?.[di]?.[slotLabel]||null;
      }, dayIdx:di }));

  return (
    <div style={{overflowX:"auto",flex:1}}>
      <div style={{width:totalW}}>
        {/* Shift group header */}
        <div style={{display:"flex",background:"#161b27",borderBottom:"1px solid #2a3142",position:"sticky",top:0,zIndex:6}}>
          <div style={{width:NAME_W,flexShrink:0,borderRight:"1px solid #2a3142"}}/>
          {spans.map(g=>{
            const sc=SHIFT_META[g.id].color;
            return <div key={g.id} style={{width:g.cols*HOUR_W,flexShrink:0,textAlign:"center",padding:"4px 0",fontSize:9,fontWeight:800,color:sc,textTransform:"uppercase",letterSpacing:0.8,background:sc+"18",borderRight:`1px solid ${sc}44`,borderTop:`2px solid ${sc}`}}>{g.label}</div>;
          })}
          <div style={{width:36,flexShrink:0,borderLeft:"1px solid #2a3142",textAlign:"center",padding:"4px 0",fontSize:9,fontWeight:700,color:"#64748b"}}>h</div>
        </div>
        {/* Hour headers */}
        <div style={{display:"flex",background:"#1a1f2e",borderBottom:"2px solid #2a3142",position:"sticky",top:22,zIndex:5}}>
          <div style={{width:NAME_W,flexShrink:0,padding:"4px 6px",fontSize:9,fontWeight:700,color:"#64748b",borderRight:"1px solid #2a3142",display:"flex",alignItems:"center"}}>{rowKey==="day"?"Nombre":"Día"}</div>
          {slots.map((h,hi)=>{
            const sc=SHIFT_META[h.shiftId].color;
            const isFirst=hi===0||slots[hi-1].shiftId!==h.shiftId;
            return <div key={hi} style={{width:HOUR_W,flexShrink:0,textAlign:"center",padding:"4px 0",fontSize:8,fontWeight:700,color:sc,background:sc+"0d",borderRight:`1px solid ${sc}33`,borderLeft:isFirst?`2px solid ${sc}66`:"none"}}>{h.label}</div>;
          })}
          <div style={{width:36,flexShrink:0,borderLeft:"1px solid #2a3142"}}/>
        </div>
        {/* Rows */}
        {rows.map((row,ri)=>{
          const rowH = slots.filter(h=>row.getData(h.label)).length;
          const clickDayIdx = rowKey==="day" ? selectedDay : row.dayIdx;
          const clickEmpId  = rowKey==="day" ? row.emp.id : rowKey;
          return (
            <div key={row.id} style={{display:"flex",borderBottom:"1px solid #2a3142",background:ri%2===0?"#1a1f2e":"#161b27",minHeight:42}}>
              <div style={{width:NAME_W,flexShrink:0,padding:"0 7px",fontSize:10,fontWeight:rowKey==="day"?600:700,color:rowKey==="day"?"#e2e8f0":dept.color,borderRight:"1px solid #2a3142",display:"flex",alignItems:"center",wordBreak:"break-word",lineHeight:1.3,cursor:rowKey==="day"?"pointer":"default"}}
                onClick={rowKey==="day"&&onCellClick?()=>onCellClick({type:"name",emp:row.emp}):undefined}>
                {row.label}
              </div>
              {slots.map((h,hi)=>{
                const code=row.getData(h.label);
                const r=code?roleObj(code):null;
                const sc=SHIFT_META[h.shiftId].color;
                const styles=cellBg(code,r,sc);
                return (
                  <div key={hi}
                    onClick={()=>onCellClick&&onCellClick({type:"cell",empId:clickEmpId,dayIdx:clickDayIdx,slotKey:h.label,shiftId:h.shiftId,wk})}
                    style={{width:HOUR_W,flexShrink:0,minHeight:42,cursor:"pointer",margin:"2px 1px",borderRadius:4,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,overflow:"hidden",...styles}}>
                    <CellContent code={code} r={r} empName={rowKey==="day"?row.emp?.name:employees.find(e=>e.id===rowKey)?.name} employees={employees}/>
                  </div>
                );
              })}
              <div style={{width:36,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:rowH>0?dept.color:"#2a3142",borderLeft:"1px solid #2a3142"}}>{rowH>0?rowH:""}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Screens ──────────────────────────────────────────────────────

function RoleFormScreen({role,dept,employees,onBack,onSave}) {
  const isNew=!role;
  const [code,setCode]=useState(role?.code||"");
  const [label,setLabel]=useState(role?.label||"");
  const [color,setColor]=useState(role?.color||COLORS[4]);
  const tCol=tc(color);
  return (
    <div style={{background:"#0f1117",minHeight:"100vh",color:"#f1f5f9",maxWidth:430,margin:"0 auto"}}>
      <div style={{background:"#161b27",padding:"16px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #2a3142"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#F59E0B",fontSize:22,cursor:"pointer"}}>‹</button>

function ScheduleScreen({dept,employees,onBack,onUpdate,onAddEmp,onOpenEmpWeek}) {
  const [cellPicker,setCellPicker]=useState(null);
  const [selDay,setSelDay]=useState(0);
  const [slots,setSlots]=useState(DEFAULT_SLOTS);
  const [weekOffset,setWeekOffset]=useState(0);
  const [showAddEmp,setShowAddEmp]=useState(false);
  const [showHours,setShowHours]=useState(false);
  const [showFullWeek,setShowFullWeek]=useState(false);
  const [confirmClear,setConfirmClear]=useState(false);

  const monday=getMonday(weekOffset);
  const weekEnd=new Date(monday);weekEnd.setDate(monday.getDate()+6);
  const weekLabel=`${fmtDate(monday)} – ${fmtDate(weekEnd)}`;
  const spans=shiftSpans(slots);
  const deptEmps=employees.filter(e=>e.dept===dept.id);
  const dynSpans=spans;

  function handleCell(info) {
    if (info.type==="name") { onOpenEmpWeek(info.emp,weekOffset); return; }
    setCellPicker(info);
  }
  function handleAssign(code,keys) {
    if (!cellPicker) return;
    keys.forEach(k=>onUpdate(cellPicker.empId,cellPicker.wk,cellPicker.dayIdx,k,code));
    setCellPicker(null);
  }

  return (
    <div style={{background:"#0f1117",minHeight:"100vh",color:"#f1f5f9",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e2433,#161b27)",padding:"12px 13px 9px",borderBottom:"1px solid #2a3142",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:dept.color,fontSize:22,cursor:"pointer"}}>‹</button>
          <div style={{flex:1}}><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Horario semanal</div>
          <div style={{fontWeight:700,fontSize:14}}>{dept.icon} {dept.label}</div></div>
          <div style={{background:"#ffffff0a",border:"1px solid #2a3142",borderRadius:18,padding:"4px 10px",fontSize:10,fontWeight:700,color:"#e2e8f0",whiteSpace:"nowrap"}}>{weekLabel}</div>
          <button onClick={()=>setShowHours(true)} style={{background:"#ffffff0a",border:"1px solid #2a3142",borderRadius:18,padding:"4px 10px",color:"#94a3b8",fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>⏱</button>
          <button onClick={()=>setShowAddEmp(true)} style={{background:dept.color+"22",border:`1px solid ${dept.color}55`,borderRadius:18,padding:"4px 10px",color:dept.color,fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>+Emp</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <button onClick={()=>setWeekOffset(w=>w-1)} style={{flexShrink:0,background:"#ffffff0a",border:"1px solid #2a3142",borderRadius:"50%",width:26,height:26,color:"#94a3b8",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{display:"flex",gap:4,overflowX:"auto",flex:1,paddingBottom:1}}>
            {DAYS_S.map((d,i)=>(
              <div key={i} onClick={()=>setSelDay(i)} style={{flexShrink:0,minWidth:33,padding:"4px 7px",borderRadius:18,textAlign:"center",background:selDay===i?dept.color:"#0f1117",border:`1px solid ${selDay===i?dept.color:"#2a3142"}`,color:selDay===i?tc(dept.color):"#64748b",fontSize:10,fontWeight:700,cursor:"pointer"}}>{d}</div>
            ))}
          </div>
          <button onClick={()=>setWeekOffset(w=>w+1)} style={{flexShrink:0,background:"#ffffff0a",border:"1px solid #2a3142",borderRadius:"50%",width:26,height:26,color:"#94a3b8",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          <button onClick={()=>setShowFullWeek(true)} style={{flexShrink:0,background:dept.color+"22",border:`1px solid ${dept.color}55`,borderRadius:"50%",width:26,height:26,color:dept.color,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>▦</button>
        </div>
      </div>
      {/* Day banner */}
      <div style={{background:dept.color+"1a",borderBottom:`2px solid ${dept.color}44`,padding:"4px 13px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"baseline",gap:7}}>
          <span style={{fontWeight:800,fontSize:12,color:dept.color}}>{DAYS_F[selDay]}</span>
          <span style={{fontSize:10,color:"#64748b"}}>{dayDate(monday,selDay)}</span>

      </div>
      {/* Cell picker */}
      {cellPicker&&<CellPicker cellPicker={cellPicker} employees={employees} dept={dept} slots={slots} onAssign={handleAssign} onClose={()=>setCellPicker(null)}/>}
      {/* Add employee */}
      {showAddEmp&&<AddEmpSheet dept={dept} onClose={()=>setShowAddEmp(false)} onAdd={(n,r)=>{onAddEmp(n,r,wkKey(weekOffset));setShowAddEmp(false);}}/>}
      {/* Edit hours */}
      {showHours&&(
        <div onClick={()=>setShowHours(false)} style={{position:"fixed",inset:0,background:"#00000088",zIndex:100,display:"flex",alignItems:"flex-end"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1e2433",borderRadius:"18px 18px 0 0",padding:"18px 14px 40px",width:"100%",maxWidth:430,margin:"0 auto",maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,paddingBottom:11,borderBottom:"1px solid #2a3142"}}>
              <div style={{fontWeight:700,fontSize:14}}>⏱ Editar horas</div>
              <div style={{display:"flex",gap:6}}>
                <div style={{display:"flex",background:"#0f1117",borderRadius:7,padding:2,gap:2}}>
                  <button onClick={()=>setSlots(DEFAULT_SLOTS)} style={{padding:"3px 9px",borderRadius:5,border:"none",background:slots===DEFAULT_SLOTS||slots.length===DEFAULT_SLOTS.length?"#F59E0B":"none",color:slots.length===DEFAULT_SLOTS.length?"#1a1a1a":"#64748b",fontSize:10,fontWeight:700,cursor:"pointer"}}>1h</button>
                  <button onClick={()=>setSlots(SLOTS_30)} style={{padding:"3px 9px",borderRadius:5,border:"none",background:slots.length===SLOTS_30.length?"#F59E0B":"none",color:slots.length===SLOTS_30.length?"#1a1a1a":"#64748b",fontSize:10,fontWeight:700,cursor:"pointer"}}>30m</button>
                </div>
                <button onClick={()=>setSlots(DEFAULT_SLOTS)} style={{background:"none",border:"none",color:"#64748b",fontSize:10,cursor:"pointer"}}>Reset</button>
              </div>
            </div>
            {Object.entries(SHIFT_META).map(([sid,sm])=>{
              const grpSlots=slots.filter(h=>h.shiftId===sid);
              if(!grpSlots.length) return null;
              return (
                <div key={sid} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                    <div style={{fontSize:10,fontWeight:800,color:sm.color,textTransform:"uppercase",letterSpacing:1}}>{sm.label}</div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>{const last=slots.map(h=>h.shiftId).lastIndexOf(sid);if(last!==-1&&grpSlots.length>1){const n=[...slots];n.splice(last,1);setSlots(n);}}} style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:5,padding:"2px 8px",color:"#ef4444",fontSize:12,cursor:"pointer",fontWeight:700}}>−</button>
                      <button onClick={()=>{const last=slots.map(h=>h.shiftId).lastIndexOf(sid);if(last===-1)return;const h=parseInt(slots[last].label)+1;const n=[...slots];n.splice(last+1,0,{label:`${h}:00`,shiftId:sid});setSlots(n);}} style={{background:sm.color+"22",border:`1px solid ${sm.color}55`,borderRadius:5,padding:"2px 8px",color:sm.color,fontSize:12,cursor:"pointer",fontWeight:700}}>+</button>
                    </div>

// ─── Main App ─────────────────────────────────────────────────────
function App() {
  const [screen,   setScreen]   = useState("main");
  const [depts,    setDepts]    = useState(INITIAL_DEPTS);
  const [emps,     setEmps]     = useState(INITIAL_EMPLOYEES);
  const [activeDeptId, setActiveDeptId] = useState(null);
  const [activeRole,   setActiveRole]   = useState(null);
  const [editingDept,  setEditingDept]  = useState(null);
  const [confirmDelDept, setConfirmDelDept] = useState(null);
  const [previewDept,    setPreviewDept]    = useState(null);
  const [activeEmp,      setActiveEmp]      = useState(null);
  const [empWeekOffset,  setEmpWeekOffset]  = useState(0);

  const dept = depts.find(d=>d.id===activeDeptId);

  // ── Data updater ──
  function updateSchedule(empId,wk,dayIdx,slotKey,code) {
    setEmps(prev=>prev.map(e=>{
      if (e.id!==empId) return e;
      const week={...(e.schedules[wk]||{})};
      const day={...(week[dayIdx]||{})};
      if (code) day[slotKey]=code; else delete day[slotKey];
      week[dayIdx]=day;
      return {...e,schedules:{...e.schedules,[wk]:week}};
    }));
  }
  function addEmployee(name,role,wk) {
    const schedules={};
    if (role) {
      const week={};
      [0,1,2,3,4,5,6].forEach(d=>{const day={};DEFAULT_SLOTS.forEach(h=>{day[h.label]=role;});week[d]=day;});
      schedules[wk]=week;
    }
    setEmps(prev=>[...prev,{id:Date.now(),name,dept:activeDeptId,schedules}]);
  }
  function saveRole(updated) {
    setDepts(prev=>prev.map(d=>{
      if (d.id!==activeDeptId) return d;
      const roles=activeRole
        ? d.roles.map(r=>r.code===activeRole.code?{...r,...updated}:r)
        : [...d.roles,updated];
      return {...d,roles};
    }));
    if (activeRole&&updated.code!==activeRole.code) {
      setEmps(prev=>prev.map(e=>{
        if (e.dept!==activeDeptId) return e;
        const ns={};
        Object.entries(e.schedules||{}).forEach(([wk,week])=>{
          if (!week||typeof week!=="object"){ns[wk]=week;return;}
          const nw={};
          Object.entries(week).forEach(([di,shifts])=>{
            if (!shifts){nw[di]=shifts;return;}
            const nd={};
            Object.entries(shifts).forEach(([sl,r])=>{nd[sl]=r===activeRole.code?updated.code:r;});
            nw[di]=nd;
          });
          ns[wk]=nw;
        });
        return {...e,schedules:ns};
      }));
    }
    setScreen("dept");
  }
  function saveDept({label,icon,color}) {
    if (editingDept) {
      setDepts(prev=>prev.map(d=>d.id===editingDept.id?{...d,label,icon,color}:d));
    } else {
      const id=label.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
      setDepts(prev=>[...prev,{id,label,icon,color,roles:[...DEFAULT_ROLES]}]);
    }
    setScreen("main");
  }
  function deleteDeptConfirmed() {
    setDepts(prev=>prev.filter(d=>d.id!==confirmDelDept.id));
    setConfirmDelDept(null);
  }

  // ── Route: emp week view ──
  if (screen==="empWeek"&&dept&&activeEmp) {
    const emp=emps.find(e=>e.id===activeEmp.id)||activeEmp;
    return <EmpWeekScreen emp={emp} dept={dept} employees={emps} weekOffset={empWeekOffset} onBack={()=>setScreen("schedule")} onUpdate={updateSchedule}/>;
  }
  // ── Route: schedule ──
  if (screen==="schedule"&&dept) {
    return <ScheduleScreen dept={dept} employees={emps} onBack={()=>setScreen("dept")} onUpdate={updateSchedule} onAddEmp={addEmployee}
      onOpenEmpWeek={(emp,wo)=>{setActiveEmp(emp);setEmpWeekOffset(wo);setScreen("empWeek");}}/>;
  }
  // ── Route: role form ──
  if (screen==="roleForm"&&dept) {
    return <RoleFormScreen role={activeRole} dept={dept} employees={emps} onBack={()=>setScreen("dept")} onSave={saveRole}/>;
  }
  // ── Route: dept form ──
  if (screen==="deptForm") {
    return <DeptFormScreen dept={editingDept} onBack={()=>setScreen("main")} onSave={saveDept} isNew={!editingDept}/>;
  }
  // ── Route: dept ──
  if (screen==="dept"&&dept) {
    return <DeptScreen dept={dept} employees={emps} onBack={()=>setScreen("main")}
      onEditRole={r=>{setActiveRole(r);setScreen("roleForm");}}
      onAddRole={()=>{setActiveRole(null);setScreen("roleForm");}}
      onDeleteRole={code=>setDepts(prev=>prev.map(d=>d.id===activeDeptId?{...d,roles:d.roles.filter(r=>r.code!==code)}:d))}
      onOpenSchedule={()=>setScreen("schedule")}/>;
  }

  // ── Main screen ──
  const today=new Date(),dow=today.getDay(),mon=new Date(today);
  mon.setDate(today.getDate()+(dow===0?-6:1-dow));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const mainWeekLabel=`${mon.getDate()} – ${sun.getDate()} ${MONTHS[sun.getMonth()]} ${sun.getFullYear()}`;

  return (
    <div style={{background:"#0f1117",minHeight:"100vh",color:"#f1f5f9",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      <div style={{background:"linear-gradient(135deg,#1e2433,#161b27)",padding:"22px 15px 18px",borderBottom:"1px solid #2a3142"}}>
        <div style={{fontSize:9,color:"#64748b",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Horarios</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:2}}>{mainWeekLabel}</div>
        <div style={{fontSize:11,color:"#64748b"}}>Gestiona tus departamentos y roles</div>
      </div>
      <div style={{padding:"18px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Departamentos</div>
          <button onClick={()=>{setEditingDept(null);setScreen("deptForm");}} style={{background:"#F59E0B22",border:"1px solid #F59E0B55",borderRadius:18,padding:"4px 12px",color:"#F59E0B",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Añadir</button>
        </div>
        {depts.map(d=>{
          const de=emps.filter(e=>e.dept===d.id);
          const totalH=de.reduce((s,e)=>s+countH(e.schedules["w0"]),0);
          return (
            <div key={d.id} onClick={()=>{setActiveDeptId(d.id);setScreen("dept");}} style={{background:"#1e2433",border:`1px solid ${d.color}33`,borderRadius:14,marginBottom:10,overflow:"hidden",cursor:"pointer"}}>
              <div style={{height:4,background:`linear-gradient(90deg,${d.color},${d.color}55)`}}/>
              <div style={{padding:"13px 13px 10px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9}}>
                  <div style={{display:"flex",alignItems:"center",gap:9}}>
                    <div style={{fontSize:20}}>{d.icon}</div>
                    <button onClick={e=>{e.stopPropagation();setPreviewDept(d);}} style={{background:d.color+"18",border:`1px solid ${d.color}44`,borderRadius:9,padding:"4px 10px",color:d.color,fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>📅 Ver semana</button>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <button onClick={e=>{e.stopPropagation();setEditingDept(d);setScreen("deptForm");}} style={{background:"#ffffff0a",border:"1px solid #2a3142",borderRadius:7,padding:"4px 8px",color:"#94a3b8",fontSize:12,cursor:"pointer"}}>✏️</button>
                    <button onClick={e=>{e.stopPropagation();setConfirmDelDept(d);}} style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:7,padding:"4px 8px",color:"#ef4444",fontSize:12,cursor:"pointer"}}>🗑</button>
                    <div style={{background:d.color+"22",border:`1px solid ${d.color}55`,borderRadius:18,padding:"2px 9px",fontSize:10,color:d.color,fontWeight:700}}>{de.length} pers.</div>
                  </div>
                </div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:9}}>{d.label}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:9}}>
                  {d.roles.slice(0,7).map(r=><div key={r.code} style={{background:r.color+"22",border:`1px solid ${r.color}55`,borderRadius:18,padding:"1px 8px",fontSize:9,color:r.color,fontWeight:700}}>{r.code}</div>)}
                  {d.roles.length>7&&<div style={{borderRadius:18,padding:"1px 8px",fontSize:9,color:"#64748b",border:"1px solid #2a3142"}}>+{d.roles.length-7}</div>}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #2a3142",paddingTop:8}}>
                  <span style={{fontSize:10,color:"#64748b"}}>{d.roles.length} roles</span>
                  <span style={{fontSize:10,color:d.color,fontWeight:600}}>{totalH}h / semana →</span>
                </div>
              </div>
            </div>
          );
        })}
        <div onClick={()=>{setEditingDept(null);setScreen("deptForm");}} style={{background:"#1e243340",border:"1px dashed #F59E0B44",borderRadius:14,padding:"18px",textAlign:"center",marginTop:4,cursor:"pointer"}}>
          <div style={{fontSize:22,marginBottom:4}}>＋</div>
          <div style={{fontSize:12,fontWeight:600,color:"#F59E0B"}}>Nuevo departamento</div>
          <div style={{fontSize:10,color:"#475569",marginTop:2}}>Se crean 10 roles por defecto</div>
        </div>
      </div>
      {/* Week preview modal */}
      {previewDept&&<WeekPreviewModal dept={previewDept} employees={emps} onClose={()=>setPreviewDept(null)} onEdit={()=>{setActiveDeptId(previewDept.id);setPreviewDept(null);setScreen("dept");}}/>}
      {/* Confirm delete dept */}
      {confirmDelDept&&(
        <div onClick={()=>setConfirmDelDept(null)} style={{position:"fixed",inset:0,background:"#00000077",zIndex:100,display:"flex",alignItems:"flex-end"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1e2433",borderRadius:"18px 18px 0 0",padding:"20px 14px 40px",width:"100%",maxWidth:430,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,paddingBottom:12,borderBottom:"1px solid #2a3142"}}>
              <div style={{width:48,height:48,borderRadius:12,background:confirmDelDept.color+"33",border:`2px solid ${confirmDelDept.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{confirmDelDept.icon}</div>
              <div><div style={{fontWeight:700,fontSize:16}}>{confirmDelDept.label}</div><div style={{fontSize:11,color:"#64748b",marginTop:1}}>{confirmDelDept.roles.length} roles · {emps.filter(e=>e.dept===confirmDelDept.id).length} empleados</div></div>
            </div>
            <div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:9,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#ef4444"}}>⚠️ Se eliminará el departamento y todos sus roles. No se puede deshacer.</div>
            <button onClick={deleteDeptConfirmed} style={{width:"100%",padding:"13px",background:"#ef4444",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:8}}>🗑️ Sí, eliminar</button>
            <button onClick={()=>setConfirmDelDept(null)} style={{width:"100%",padding:"11px",background:"none",border:"1px solid #2a3142",borderRadius:10,color:"#64748b",fontSize:12,cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
